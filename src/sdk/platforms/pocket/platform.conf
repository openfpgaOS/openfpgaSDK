# openfpgaOS SDK — Pocket platform metadata (sourced by scripts/release.sh).
# Adding a target = add a platforms/<target>/platform.conf of this shape.
PLATFORM_PRODUCT="Analogue Pocket"   # shown in the release title
PLATFORM_TAG_SUFFIX=""               # git tag = <core><suffix>-v<ver>  -> <core>-v<ver>
PLATFORM_BUNDLE_KIND="apf"           # build/<t>/<core>/ = Cores/Assets/Platforms tree
PLATFORM_COREJSON="bundle"           # core.json lives inside the built bundle
